<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Livro ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SENHA -->
<div id="senhaTela">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="senhaInput">
  <button onclick="verificarSenha()">Entrar</button>
</div>

<!-- CAPA -->
<div id="capa" style="display:none;">
  
  <div class="card">
    <div>🎀</div>
    <img src="foto.JPG" class="foto">
    <h2>Mary 💌</h2>
    <p>abre com carinho</p>
    <button onclick="abrirLivro()">Abrir</button>
  </div>

  <!-- 🔥 NOVO (SEM MEXER NA CAPA) -->
  <div class="extra-musica">

    <div class="spotify-box">
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/playlist/0Y1rhag1gRHysSLHcgWPxW"
        width="100%" height="152"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>

    <div class="visualizador"></div>

    <div class="letra">
      <p id="letraTexto">🎵 Escolhe uma música...</p>
    </div>

  </div>

</div>

<!-- LIVRO -->
<div id="livro" style="display:none;">
  
  <div class="box">

    <div class="topo">
      <input type="color" id="corFundo">
      <input type="color" id="corTexto">
      
      <select id="fonte">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="cursive">Cursiva</option>
      </select>
    </div>

    <textarea id="texto"></textarea>

    <div class="botoes">
      <button onclick="voltar()">⬅️</button>
      <span id="paginaNum">1/50</span>
      <button onclick="proxima()">➡️</button>
    </div>

  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
