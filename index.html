<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Livro ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SENHA -->
<div id="senhaTela">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="senhaInput">
  <button onclick="verificarSenha()">Entrar</button>
</div>

<!-- CAPA -->
<div id="capa" style="display:none;">
  <div class="card">
    🎀
    <img src="foto.JPG" class="foto">
    <h2>Mary 💌</h2>
    <p>abre com carinho</p>
    <button onclick="abrirLivro()">Abrir</button>
  </div>
</div>

<!-- LIVRO -->
<div id="livro" style="display:none;">

  <!-- TOPO -->
  <div class="topo">
    <div class="acoes">
      <input type="color" id="corFundo">
      <input type="color" id="corTexto">
      <select id="fonte">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
      </select>
    </div>
  </div>

  <!-- PÁGINA -->
  <div class="box">
    <textarea id="texto"></textarea>
  </div>

  <!-- BOTÕES -->
  <div class="botoes">
    <button onclick="voltar()">⬅️</button>
    <span id="contador">1/50</span>
    <button onclick="proxima()">➡️</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
