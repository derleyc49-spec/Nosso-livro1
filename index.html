<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Livro ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SENHA -->
<div id="senhaTela">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="senhaInput">
  <button onclick="verificarSenha()">Entrar</button>
</div>

<!-- 💖 PERGUNTA 1 -->
<div id="perguntaTela" class="telaCentro" style="display:none;">
  <h2>Você vai ser a minha só minha? 💖</h2>

  <div>
    <button onclick="resposta('sim')">Sim 💕</button>
    <button onclick="resposta('nao')">Não 😢</button>
  </div>
</div>

<!-- 💍 PERGUNTA 2 -->
<div id="segundaTela" class="telaCentro" style="display:none;">
  
  <p id="textoDigitando"></p>

  <h3>Aceita? 💍</h3>

  <div>
    <button onclick="finalResposta('sim')">Sim ✅</button>
    <button onclick="finalResposta('nao')">Não ❌</button>
  </div>
</div>

<!-- CAPA -->
<div id="capa" style="display:none;">
  <div class="card">
    <div>🎀</div>
    <img src="foto.JPG" class="foto">
    <h2>Mary 💌</h2>
    <p>abre com carinho</p>
    <button onclick="abrirLivro()">Abrir</button>
  </div>
</div>

<!-- LIVRO -->
<div id="livro" style="display:none;">
  
  <div class="box">

    <div class="pesquisa-topo">
      <input type="number" id="buscarPagina" placeholder="Página...">
      <button onclick="irPagina()">🔍</button>
    </div>

    <div class="topo">
      <input type="color" id="corFundo">
      <input type="color" id="corTexto">
      
      <select id="fonte">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="cursive">Cursiva</option>
      </select>
    </div>

    <textarea id="texto"></textarea>

    <div class="botoes">
      <button onclick="voltar()">⬅️</button>
      <span id="paginaNum">1/300</span>
      <button onclick="proxima()">➡️</button>
    </div>

  </div>

</div>

<audio id="musica" src="musica4.mp3" loop></audio>

<script type="module" src="script.js"></script>

</body>
</html>
