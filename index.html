<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Livro ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SENHA -->
<div id="senhaTela">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="senhaInput">
  <button onclick="verificarSenha()">Entrar</button>
</div>

<!-- CAPA -->
<div id="capa" style="display:none;">
  <div class="card">
    <div>🎀</div>
    <img src="foto.JPG" class="foto">
    <h2>Mary 💌</h2>
    <p>abre com carinho</p>
    <button onclick="abrirLivro()">Abrir</button>
  </div>
</div>

<!-- LIVRO -->
<div id="livro" style="display:none;">

  <div class="topo">
    <span id="paginaNum">Página 1</span>
    <input type="color" id="corPicker">
  </div>

  <div class="box">
    <textarea id="texto"></textarea>
  </div>

  <div class="botoes">
    <button onclick="voltar()">⬅️</button>
    <button onclick="proxima()">➡️</button>
  </div>

</div>

<!-- CORAÇÕES -->
<div id="coracoes"></div>

<script type="module" src="script.js"></script>
</body>
</html>
