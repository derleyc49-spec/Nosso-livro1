<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Nosso Livro 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CAPA -->
<div id="capa">
  <div class="card">
    <img src="foto.JPG" class="foto">

    <h2>Mary 💌</h2>
    <p>abre com carinho</p>

    <button onclick="abrirLivro()">Abrir</button>

    <!-- 🎧 PLAYER (ADICIONADO) -->
    <div class="player">
      <audio id="audio"></audio>

      <div class="controls">
        <button onclick="voltarMusica()">⏮</button>
        <button onclick="toggleMusica()" id="playBtn">▶️</button>
        <button onclick="proximaMusica()">⏭</button>
      </div>
    </div>

  </div>
</div>

<!-- LIVRO -->
<div id="livro" style="display:none;">
  <div class="box">

    <div class="topo">
      <input type="color" id="corFundo">
      <input type="color" id="corTexto">

      <select id="fonte">
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="cursive">Cursiva</option>
      </select>
    </div>

    <textarea id="texto"></textarea>

    <div class="botoes">
      <button onclick="voltar()">⬅️</button>
      <span id="paginaNum">1/50</span>
      <button onclick="proxima()">➡️</button>
    </div>

  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
